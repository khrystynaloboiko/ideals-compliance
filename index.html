<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideals Group — Legal Compliance Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #ffffff;
    --bg2:       #f7f8fa;
    --bg3:       #eef0f4;
    --border:    #dde1e8;
    --text:      #1a1d23;
    --text2:     #5a6074;
    --text3:     #9098ae;
    --accent:    #2563eb;
    --green:     #16a34a;
    --green-bg:  #dcfce7;
    --amber:     #b45309;
    --amber-bg:  #fef3c7;
    --red:       #b91c1c;
    --red-bg:    #fee2e2;
    --radius:    8px;
    --radius-lg: 12px;
    --shadow:    0 1px 4px rgba(0,0,0,.08);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg2);
    color: var(--text);
    font-size: 13px;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: #0f1f3d;
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 3px solid #2563eb;
  }
  .header-icon { font-size: 22px; }
  .header-title { font-size: 16px; font-weight: 600; letter-spacing: -.01em; }
  .header-sub { font-size: 11px; color: #94a3b8; margin-top: 1px; }
  .header-date { margin-left: auto; font-size: 11px; color: #94a3b8; }

  /* ── Layout ── */
  .layout { display: flex; gap: 0; min-height: calc(100vh - 54px); }
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 12px 0;
    gap: 0;
  }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Sidebar sections ── */
  .s-section { padding: 8px 14px 4px; }
  .s-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin-bottom: 6px; }
  .s-field { margin-bottom: 8px; }
  .s-field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 3px; }
  select, input[type=text], input[type=date] {
    width: 100%; padding: 5px 8px; font-size: 12px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg2); color: var(--text);
    font-family: inherit; appearance: none;
  }
  select:focus, input:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
  .s-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

  /* ── KPI cards ── */
  .kpis {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 10px; padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .kpi { background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; border: 1px solid var(--border); position: relative; overflow: hidden; }
  .kpi::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; }
  .kpi.total::before { background:#2563eb; }
  .kpi.ok::before    { background:#16a34a; }
  .kpi.soon::before  { background:#d97706; }
  .kpi.over::before  { background:#dc2626; }
  .kpi-n { font-size: 26px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
  .kpi.total .kpi-n { color: var(--text); }
  .kpi.ok    .kpi-n { color: var(--green); }
  .kpi.soon  .kpi-n { color: var(--amber); }
  .kpi.over  .kpi-n { color: var(--red); }
  .kpi-l { font-size: 10px; color: var(--text2); margin-top: 3px; text-transform: uppercase; letter-spacing: .04em; }

  /* ── Reminders ── */
  .reminders { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .rem-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text2); margin-bottom: 6px; }
  .rem-list { display: flex; flex-direction: column; gap: 4px; }
  .rem-item { padding: 5px 10px; border-radius: 6px; font-size: 12px; border-left: 3px solid; }
  .rem-item.over { background: var(--red-bg);   color: var(--red);   border-color: #dc2626; }
  .rem-item.soon { background: var(--amber-bg); color: var(--amber); border-color: #d97706; }
  .rem-all-ok { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; }

  /* ── Toolbar ── */
  .toolbar {
    padding: 8px 16px; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border); background: var(--bg);
    flex-wrap: wrap;
  }
  .toolbar-info { font-size: 12px; color: var(--text2); flex: 1; }

  /* ── Buttons ── */
  .btn {
    padding: 5px 12px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text);
    cursor: pointer; font-family: inherit; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .btn:hover { background: var(--bg2); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: #1d4ed8; }
  .btn.danger { background: var(--red-bg); color: var(--red); border-color: #fca5a5; }
  .btn.danger:hover { background: #fecaca; }
  .btn-icon { background: none; border: none; cursor: pointer; color: var(--text2); padding: 2px 5px; border-radius: 4px; font-size: 13px; }
  .btn-icon:hover { background: var(--bg3); color: var(--text); }

  /* ── Table ── */
  .table-wrap { flex: 1; overflow: auto; }
  table { width: 100%; border-collapse: collapse; background: var(--bg); }
  th {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em;
    color: var(--text2); padding: 7px 10px; text-align: left;
    border-bottom: 2px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 2;
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  th:hover { color: var(--text); }
  th.sorted { color: var(--accent); }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: var(--bg2); }
  tr.row-over td  { background: #fff5f5; }
  tr.row-soon td  { background: #fffbeb; }

  /* ── Status badge ── */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.ok   { background: var(--green-bg); color: var(--green); }
  .badge.soon { background: var(--amber-bg); color: var(--amber); }
  .badge.over { background: var(--red-bg);   color: var(--red);   }
  .badge.unk  { background: var(--bg3);       color: var(--text2); }

  .src-tag { display: inline-block; padding: 1px 5px; border-radius: 4px; font-size: 10px; font-family: monospace; background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .rule-hint { display: block; font-size: 10px; color: var(--text3); margin-top: 1px; }

  /* ── Edit row ── */
  .edit-row td { background: #eff6ff !important; }
  .edit-row input, .edit-row select { font-size: 12px; padding: 3px 5px; width: 100%; }

  /* ── Add entity panel ── */
  .add-panel {
    position: fixed; right: 0; top: 0; bottom: 0; width: 320px;
    background: var(--bg); border-left: 1px solid var(--border);
    box-shadow: -4px 0 16px rgba(0,0,0,.1);
    z-index: 100; display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform .22s ease;
  }
  .add-panel.open { transform: translateX(0); }
  .add-panel-hd { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
  .add-panel-hd h3 { font-size: 14px; font-weight: 600; flex: 1; }
  .add-panel-body { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
  .add-panel-ft { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .form-field label { display: block; font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 4px; }
  .form-field input, .form-field select { font-size: 13px; }
  .form-field .hint { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .error-msg { font-size: 11px; color: var(--red); background: var(--red-bg); padding: 5px 8px; border-radius: 4px; }

  /* ── Overlay ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 99; display: none; }
  .overlay.open { display: block; }

  /* ── Empty state ── */
  .empty-state { text-align: center; padding: 40px; color: var(--text2); }
  .empty-state p { font-size: 13px; }

  /* ── Footer ── */
  .footer { padding: 6px 16px; font-size: 10px; color: var(--text3); border-top: 1px solid var(--border); background: var(--bg); }

  /* ── Section divider row in table ── */
  .section-row td {
    background: #eef3fb;
    font-size: 11px; font-weight: 600;
    color: #2563eb;
    padding: 6px 10px;
    border-top: 2px solid #c7d8f5;
    border-bottom: 1px solid #c7d8f5;
    letter-spacing: .02em;
  }

  /* ── Grouped table header styles ── */
  .th-group-internal {
    background: #ede9fe; color: #5b21b6;
    text-align: center; font-size: 10px; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase;
    border-bottom: 2px solid #c4b5fd;
    padding: 6px 8px;
  }
  .th-group-external {
    background: #dcfce7; color: #166534;
    text-align: center; font-size: 10px; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase;
    border-bottom: 2px solid #86efac;
    padding: 6px 8px;
  }
  .th-sub-internal { background: #f5f3ff; border-bottom: 2px solid #c4b5fd; }
  .th-sub-external { background: #f0fdf4; border-bottom: 2px solid #86efac; }
  .obl-none { color: var(--text3); text-align:center; }
  .obl-type { font-size:12px; }
  .obl-dl   { font-size:12px; }
  .obl-days { font-size:12px; padding-right:10px; }
  .obl-status { }

  /* ── Internal action tag ── */
  .internal-tag {
    display: inline-block; margin-left: 5px;
    padding: 1px 5px; border-radius: 3px;
    font-size: 9px; font-weight: 600;
    background: #f0f4ff; color: #3730a3;
    border: 1px solid #c7d2fe;
    vertical-align: middle;
  }

  /* ── Biennial tag ── */
  .biennial-tag {
    display: inline-block; margin-left: 5px;
    padding: 1px 5px; border-radius: 4px;
    font-size: 9px; font-weight: 600;
    background: #ede9fe; color: #5b21b6;
    border: 1px solid #c4b5fd;
    vertical-align: middle;
  }

  /* ── Authority hint under filing type ── */
  .auth-hint { display: block; font-size: 10px; color: var(--text3); margin-top: 1px; }

  /* ── Sync status indicator ── */
  .sync-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px; }
  .sync-dot.ok      { background:#16a34a; }
  .sync-dot.saving  { background:#d97706; animation: pulse .8s infinite; }
  .sync-dot.error   { background:#b91c1c; }
  .sync-dot.offline { background:#9098ae; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .sync-label { font-size:11px; color:#94a3b8; }


  .modal-box {
    background:var(--bg); border-radius:var(--radius-lg);
    box-shadow:0 8px 40px rgba(0,0,0,.25);
    width:480px; max-width:95vw;
    display:flex; flex-direction:column;
  }
  .modal-hd {
    padding:20px 24px 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px;
  }
  .modal-hd h2 { font-size:16px; font-weight:600; flex:1; }
  .modal-body { padding:20px 24px; display:flex; flex-direction:column; gap:14px; }
  .modal-ft   { padding:14px 24px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
  .modal-field label { display:block; font-size:11px; font-weight:600; color:var(--text2); margin-bottom:5px; text-transform:uppercase; letter-spacing:.04em; }
  .modal-field input { width:100%; padding:8px 10px; font-size:13px; border:1px solid var(--border); border-radius:var(--radius); background:var(--bg2); color:var(--text); font-family:inherit; }
  .modal-field input:focus { outline:2px solid var(--accent); border-color:var(--accent); }
  .modal-hint { font-size:12px; color:var(--text2); line-height:1.6; }
  .modal-hint a { color:var(--accent); }
  .modal-hint code { background:var(--bg3); padding:1px 5px; border-radius:3px; font-family:monospace; font-size:11px; }
  .modal-error { font-size:12px; color:var(--red); background:var(--red-bg); padding:7px 10px; border-radius:6px; display:none; }
  .modal-success { font-size:12px; color:var(--green); background:var(--green-bg); padding:7px 10px; border-radius:6px; display:none; line-height:1.6; }
  .share-url-box { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:8px 10px; font-size:11px; font-family:monospace; word-break:break-all; color:var(--text2); cursor:pointer; }
  .share-url-box:hover { background:var(--bg2); }
  .tab-btns { display:flex; gap:0; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  .tab-btn { flex:1; padding:7px; font-size:12px; font-weight:500; border:none; background:var(--bg2); color:var(--text2); cursor:pointer; font-family:inherit; }
  .tab-btn.active { background:var(--accent); color:#fff; }
  .tab-pane { display:none; }
  .tab-pane.active { display:flex; flex-direction:column; gap:12px; }

  /* ── Filing Status 2026 badges ── */
  .fs-badge {
    display: inline-block; padding: 3px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 600; cursor: pointer;
    user-select: none; white-space: nowrap;
    transition: opacity .15s;
  }
  .fs-badge:hover { opacity: .75; }
  .fs-badge.submitted { background: var(--green-bg); color: var(--green); }
  .fs-badge.pending   { background: var(--amber-bg); color: var(--amber); }
  .fs-badge.na        { background: var(--bg3);      color: var(--text3); }
  .fs-badge.unset     { background: var(--bg3);      color: var(--text3);
                        border: 1px dashed var(--border); }

  /* ── Tab navigation ── */
  .tab-nav { background: #0a1628; border-bottom: 1px solid #1e2d42; }
  .tab-nav-inner { display: flex; gap: 2px; padding: 0 16px; overflow-x: auto; }
  .nav-tab {
    background: none; border: none; border-bottom: 2.5px solid transparent;
    color: #7a8fa6; font-family: inherit; font-size: 13.5px; font-weight: 600;
    padding: 13px 18px 12px; cursor: pointer; white-space: nowrap;
    transition: color .15s, border-color .15s;
  }
  .nav-tab:hover { color: #ffffff; }
  .nav-tab.active { color: #ffffff; border-bottom-color: var(--accent); }
  .nav-tab .tab-count {
    display: inline-block; margin-left: 6px; padding: 1px 7px;
    border-radius: 20px; font-size: 11px; font-weight: 700;
    background: rgba(255,255,255,.1); color: #9aafc4;
  }
  .nav-tab.active .tab-count { background: var(--accent); color: #fff; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="header-icon">⚖️</span>
  <div>
    <div class="header-title">Ideals Group — Legal Compliance Tracker</div>
    <div class="header-sub">Annual filing obligations · Multi-jurisdiction</div>
  </div>
  <div style="display:flex;align-items:center;gap:16px;margin-left:auto">
    <div id="sync-status" style="display:flex;align-items:center;cursor:pointer" title="Cloud sync status">
      <span class="sync-dot offline" id="sync-dot"></span>
      <span class="sync-label" id="sync-label">Not connected</span>
    </div>
    <div class="header-date" id="hdr-date"></div>
  </div>
</div>

<!-- Tab Navigation -->
<nav class="tab-nav">
  <div class="tab-nav-inner">
    <button class="nav-tab active" onclick="switchTab('all')" id="tab-all">
      All <span class="tab-count" id="cnt-all">0</span>
    </button>
    <button class="nav-tab" onclick="switchTab('int')" id="tab-int">
      📋 Internal Action <span class="tab-count" id="cnt-int">0</span>
    </button>
    <button class="nav-tab" onclick="switchTab('ext')" id="tab-ext">
      📤 External Filing <span class="tab-count" id="cnt-ext">0</span>
    </button>
  </div>
</nav>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="s-section">
      <div class="s-label">Filters</div>
      <div class="s-field">
        <label>Jurisdiction</label>
        <select id="f-country" onchange="render()"><option value="">All</option></select>
      </div>
      <div class="s-field">
        <label>Status</label>
        <select id="f-status" onchange="render()">
          <option value="">All</option>
          <option value="over">⚠ Overdue</option>
          <option value="soon">Due soon (≤30d)</option>
          <option value="ok">OK</option>
        </select>
      </div>


      <div class="s-field">
        <label>Section</label>
        <select id="f-section" onchange="render()">
          <option value="">All sections</option>
          <option value="intl">🌍 International entities</option>
          <option value="us">🇺🇸 US State filings</option>
        </select>
      </div>
      <div class="s-field">
        <label>Filing Status 2026</label>
        <select id="f-fs2026" onchange="render()">
          <option value="">All</option>
          <option value="submitted">✅ Submitted</option>
          <option value="pending">⏳ Pending</option>
          <option value="na">— N/A</option>
          <option value="">Not set</option>
        </select>
      </div>
    </div>

    <hr class="s-divider">

    <div class="s-section">
      <div class="s-label">Sort</div>
      <div class="s-field">
        <select id="f-sort" onchange="render()">
          <option value="asc">Deadline — soonest first</option>
          <option value="desc">Deadline — latest first</option>
          <option value="name">Entity name A→Z</option>
          <option value="country">Country A→Z</option>
        </select>
      </div>
    </div>

    <hr class="s-divider">

    <div class="s-section">
      <div class="s-label">Actions</div>
      <div class="s-field">
        <button class="btn primary" style="width:100%" onclick="openAddPanel()">＋ Add entity</button>
      </div>
      <div class="s-field">
        <button class="btn" style="width:100%" onclick="exportCSV()">⬇ Export CSV</button>
      </div>
      <div class="s-field">
        <button class="btn" style="width:100%;background:#eff6ff;border-color:#93c5fd;color:#1d4ed8" onclick="forceSyncToCloud()">☁️ Push to cloud</button>
      </div>
    </div>

    <div style="flex:1"></div>
    <div style="padding:10px 14px;font-size:10px;color:var(--text3);line-height:1.5">
      <b>XLS</b> = from Excel file<br>
      <b>USR</b> = from entity list<br>
      Click any row to edit.
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- KPIs -->
    <div class="kpis" id="kpis"></div>

    <!-- Reminders -->
    <div class="reminders">
      <div class="rem-title">🔔 Reminders</div>
      <div class="rem-list" id="reminders"></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <span class="toolbar-info" id="toolbar-info"></span>
      <button class="btn" onclick="clearFilters()">✕ Clear filters</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead id="thead-wrap"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="footer" id="footer-info"></div>
  </main>
</div>

<!-- Add / Edit panel -->
<div class="overlay" id="overlay" onclick="closeAddPanel()"></div>
<div class="add-panel" id="add-panel">
  <div class="add-panel-hd">
    <h3 id="panel-title">Add / Edit entity</h3>
    <button class="btn-icon" onclick="closeAddPanel()">✕</button>
  </div>
  <div class="add-panel-body">
    <div id="panel-error" style="display:none"></div>

    <!-- ── Entity info ── -->
    <div class="form-field">
      <label>Entity name *</label>
      <input id="p-name" type="text" placeholder="e.g. Ideals Poland sp. z o.o.">
    </div>
    <div class="form-field">
      <label>Country / Jurisdiction *</label>
      <input id="p-country" type="text" placeholder="e.g. Poland">
    </div>
    <div class="form-field" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div>
        <label style="display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Section</label>
        <select id="p-section">
          <option value="intl">🌍 International</option>
          <option value="us">🇺🇸 US State</option>
        </select>
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Source</label>
        <select id="p-src"><option>USR</option><option>XLS</option></select>
      </div>
    </div>

    <!-- ── Internal Action ── -->
    <div style="border:1px solid #c4b5fd;border-radius:8px;padding:10px 12px;background:#f5f3ff">

function addMonths(d, m) { const r = new Date(d); r.setMonth(r.getMonth() + m); return r; }

// Deadline calculator — respects isDone:
// If deadline passed AND not done → stays overdue (no auto-roll to next year)
// If deadline passed AND done     → shows next year's deadline
function calcDeadlineFor(base, rule, period, last, incorp, isDone) {
  const today = new Date(); today.setHours(0,0,0,0);
  const p = period || 12;

  if (base && rule) {
    const m = rule.match(/\+\s*(\d+)/);
    const off = m ? +m[1] : 0;

    // Current year deadline
    const dlThis = (() => {
      try { const bd = new Date(today.getFullYear() + "-" + base);
            if (isNaN(bd)) return null;
            const d = new Date(bd); d.setDate(d.getDate() + off); return d; }
      catch(e) { return null; }
    })();

    // Next year deadline
    const dlNext = (() => {
      try { const bd = new Date((today.getFullYear()+1) + "-" + base);
            if (isNaN(bd)) return null;
            const d = new Date(bd); d.setDate(d.getDate() + off); return d; }
      catch(e) { return null; }
    })();

    if (dlThis && dlThis >= today) return dlThis;  // upcoming
    if (dlThis && dlThis < today) {
      if (!isDone) return dlThis;  // OVERDUE — stays here until marked Done/Submitted
      return dlNext;               // marked done → show next year
    }
    return dlNext;
  }

  // Anniversary-based
  const ref = last ? new Date(last) : incorp ? new Date(incorp) : null;
  if (!ref || isNaN(ref)) return null;
  let dl = addMonths(ref, p);
  let prevDl = null;
  while (dl < today) { prevDl = dl; dl = addMonths(dl, p); }
  // If no last date recorded and deadline passed → show as overdue until done
  if (prevDl && !last && !isDone) return prevDl;
  return dl;
}

function statusOf(days) {
  if (days === null) return "unk";
  if (days > 30) return "ok";
  if (days >= 0) return "soon";
  return "over";
}

function worstStatus(s1, s2) {
  const rank = {over:0, soon:1, ok:2, unk:3};
  if ((rank[s1]??3) <= (rank[s2]??3)) return s1;
  return s2;
}

function processed() {
  const today = new Date(); today.setHours(0,0,0,0);
  return ENTITIES.map(e => {
    // Internal obligation
    const int_isDone = e.int_status2026 === "submitted";
    const int_dl   = e.int_type ? calcDeadlineFor(
      e.int_base || "", e.int_rule || "", e.int_period || 12,
      e.int_last || e.last || "", e.int_incorp || "", int_isDone) : null;
    const int_days = int_dl ? Math.round((int_dl - today) / 86400000) : null;
    // If marked submitted/done → force status ok (hide from due soon)
    const int_status = e.int_type
      ? (e.int_status2026 === "submitted" ? "ok" : statusOf(int_days))
      : "unk";
    const ext_isDone = e.ext_status2026 === "submitted" || e.status2026 === "submitted";
    // Fallback to legacy fields for old JSONBin data compatibility
    const ext_dl   = (e.ext_type || e.type) ? calcDeadlineFor(
      e.ext_base || e.base || "", e.ext_rule || e.rule || "", e.ext_period || e.period || 12,
      e.ext_last || e.last || "", e.ext_incorp || e.incorp || "", ext_isDone) : null;
    const ext_days = ext_dl ? Math.round((ext_dl - today) / 86400000) : null;
    const ext_status = e.ext_type
      ? (e.ext_status2026 === "submitted" ? "ok" : statusOf(ext_days))
      : "unk";
    // Overall = worst active status
    const activeStatuses = [e.int_type ? int_status : null, e.ext_type ? ext_status : null].filter(Boolean);
    const overall = activeStatuses.length ? activeStatuses.reduce(worstStatus) : "unk";
    // dl for sorting = earliest active deadline
    const dls = [int_dl, ext_dl].filter(Boolean);
    const earliest_dl = dls.length ? dls.reduce((a,b) => a < b ? a : b) : null;
    // earliest_days for backward-compat (reminders, sorting by days)
    const earliest_days = [int_days, ext_days].filter(d => d !== null).reduce((a,b) => a < b ? a : b, null);
    return { ...e, int_dl, int_days, int_status, ext_dl, ext_days, ext_status, status: overall, dl: earliest_dl, days: earliest_days };
  });
}

function applyFilters(data) {
  const c   = document.getElementById("f-country").value;
  const s   = document.getElementById("f-status").value;
  const sc  = document.getElementById("f-section").value;
  const fs  = document.getElementById("f-fs2026").value;
  return data.filter(e => {
    if (!c  || e.country === c) {} else return false;
    if (!fs || e.int_status2026 === fs || e.ext_status2026 === fs) {} else return false;
    if (sc && e.section !== sc) return false;
    // Tab filter
    if (ACTIVE_TAB === 'int' && !e.int_type) return false;
    if (ACTIVE_TAB === 'ext' && !e.ext_type) return false;
    // Status filter (respect tab)
    if (s) {
      const st = ACTIVE_TAB === 'int' ? e.int_status : ACTIVE_TAB === 'ext' ? e.ext_status : e.status;
      if (st !== s) return false;
    }
    return true;
  });
}

function applySort(data) {
  const v = document.getElementById("f-sort").value;
  const copy = [...data];
  if (v === "asc")     copy.sort((a,b) => (a.dl||new Date(9999,0)) - (b.dl||new Date(9999,0)));
  else if (v === "desc") copy.sort((a,b) => (b.dl||new Date(0)) - (a.dl||new Date(0)));
  else if (v === "name") copy.sort((a,b) => a.name.localeCompare(b.name));
  else if (v === "country") copy.sort((a,b) => a.country.localeCompare(b.country));
  return copy;
}

function toggleSort(col) {
  const mapping = { name: "name", country: "country", dl: "asc", days: "asc" };
  document.getElementById("f-sort").value = mapping[col] || "asc";
  render();
}

const FS_CYCLE = ["", "submitted", "pending", "na"];
const FS_LABEL_INT = { "": "— set status", submitted: "✅ Done",      pending: "⏳ Pending", na: "N/A" };
const FS_LABEL_EXT = { "": "— set status", submitted: "✅ Submitted", pending: "⏳ Pending", na: "N/A" };
const FS_LABEL = FS_LABEL_EXT; // default for export/reminders

function toggleFS2026(id, kind) {
  const e = ENTITIES.find(x => x.id === id);
  if (!e) return;
  const field = kind === "int" ? "int_status2026" : "ext_status2026";
  const cur = e[field] || "";
  const idx = FS_CYCLE.indexOf(cur);
  e[field] = FS_CYCLE[(idx + 1) % FS_CYCLE.length];
  debouncedSave();
  render();
}

function fsBadge(e, kind) {
  const field  = kind === "int" ? "int_status2026" : "ext_status2026";
  const labels = kind === "int" ? FS_LABEL_INT : FS_LABEL_EXT;
  const v   = e[field] || "";
  const cls = v || "unset";
  return `<span class="fs-badge ${cls}" onclick="toggleFS2026(${e.id},'${kind}')" title="Click to change">${labels[v]}</span>`;
}

function dStr(days) {
  return days === null ? "—" : days < 0 ? `−${Math.abs(days)}` : String(days);
}
function obligCell(type, dl, days, status, authHint, period) {
  if (!type) return `<td class="obl-none" colspan="3">—</td><td class="obl-none"></td>`;
  const biTag = period === 24 ? `<span class="biennial-tag">biennial</span>` : "";
  const auth  = authHint ? `<span class="auth-hint">${authHint}</span>` : "";
  const badge = `<span class="badge ${status}">${status==="over"?"⚠ Overdue":(lbl[status]||"")}</span>`;
  return `<td class="obl-type">${type}${biTag}${auth}</td>
    <td class="obl-dl" style="white-space:nowrap">${fmtDate(dl)}</td>
    <td class="obl-days" style="text-align:right;font-variant-numeric:tabular-nums">${dStr(days)}</td>
    <td class="obl-status">${badge}</td>`;
}

function buildRows(rows) {
  return rows.map(e => {
    const rowCls = e.status === "over" ? "row-over" : e.status === "soon" ? "row-soon" : "";
    const intCells = obligCell(e.int_type, e.int_dl, e.int_days, e.int_status, e.int_authority && !e.int_authority.startsWith("Internal") ? e.int_authority : "", e.int_period);
    const extCells = obligCell(e.ext_type, e.ext_dl, e.ext_days, e.ext_status, e.ext_authority, e.ext_period);
    return `<tr class="${rowCls}">
      <td style="font-weight:500;min-width:150px">${e.name || ""}</td>
      <td style="white-space:nowrap">${getFlag(e)} ${e.country || ""}</td>
      ${intCells}
      ${fsBadge(e,'int') ? `<td style="text-align:center">${fsBadge(e,'int')}</td>` : '<td></td>'}
      ${extCells}
      ${fsBadge(e,'ext') ? `<td style="text-align:center">${fsBadge(e,'ext')}</td>` : '<td></td>'}
      <td style="text-align:center"><span class="src-tag">${e.src || ""}</span></td>
      <td style="text-align:center"><button class="btn-icon" onclick="openEditPanel(${e.id})" title="Edit">✏️</button></td>
    </tr>`;
  }).join("");
}

function render() {
  const all = processed();

  const today = new Date();
  const sectionFilter = document.getElementById("f-section").value;

  // KPIs — always on full dataset
  const c = {ok:0,soon:0,over:0,unk:0};
  all.forEach(e => c[e.status]++);
  document.getElementById("kpis").innerHTML = `
    <div class="kpi total"><div class="kpi-n">${all.length}</div><div class="kpi-l">Total entities</div></div>
    <div class="kpi ok">  <div class="kpi-n">${c.ok}</div>   <div class="kpi-l">✅ Compliant</div></div>
    <div class="kpi soon"><div class="kpi-n">${c.soon}</div> <div class="kpi-l">⚠️ Due soon</div></div>
    <div class="kpi over"><div class="kpi-n">${c.over}</div> <div class="kpi-l">🔴 Overdue</div></div>`;

  // Reminders — always on full dataset
  const urgent = all
    .filter(e => {
      if (e.status === "over") return true;
      if (e.int_type && e.int_status2026 !== "submitted" && e.int_days !== null && e.int_days >= 0 && e.int_days <= 30) return true;
      if (e.ext_type && e.ext_status2026 !== "submitted" && e.ext_days !== null && e.ext_days >= 0 && e.ext_days <= 30) return true;
      return false;
    })
    .sort((a,b) => (a.days??9999) - (b.days??9999));
  const rDiv = document.getElementById("reminders");
  if (!urgent.length) {
    rDiv.innerHTML = `<div class="rem-all-ok">✅ No urgent filings — all entities are on track.</div>`;
  } else {
    rDiv.innerHTML = urgent.map(e => {
      const cls = e.status === "over" ? "over" : "soon";
      // Build detail for int and/or ext
      const parts = [];
      if (e.int_type && e.int_status2026 !== "submitted" && e.int_days !== null && e.int_days <= 30) {
        const tag = e.int_days < 0 ? `overdue by ${Math.abs(e.int_days)}d` : `${e.int_days}d left`;
        parts.push(`📋 <b>Internal:</b> ${e.int_type} — ${tag} (${fmtDate(e.int_dl)})`);
      }
      if (e.ext_type && e.ext_status2026 !== "submitted" && e.ext_days !== null && e.ext_days <= 30) {
        const tag = e.ext_days < 0 ? `overdue by ${Math.abs(e.ext_days)}d` : `${e.ext_days}d left`;
        parts.push(`📤 <b>External:</b> ${e.ext_type} — ${tag} (${fmtDate(e.ext_dl)})`);
      }
      // Also catch overdue with days > 30 threshold but status=over
      if (!parts.length) {
        const tag = e.days < 0 ? `overdue by ${Math.abs(e.days)} day(s)` : `${e.days} day(s) left`;
        parts.push(`${e.days < 0 ? "was due" : "due"} ${fmtDate(e.dl)} — ${tag}`);
      }
      const msg = `<b>${e.name}</b> (${e.country})<br><span style="font-size:11px">${parts.join('<br>')}</span>`;
      return `<div class="rem-item ${cls}">${msg}</div>`;
    }).join("");
  }

  // Toolbar
  const filtered = applyFilters(all);
  document.getElementById("toolbar-info").textContent =

  sv("p-int-incorp",    e.int_incorp    || "");
  sv("p-int-base",      e.int_base      || "");
  sv("p-int-rule",      e.int_rule      || "base_date + 42 days");
  sv("p-int-period",    String(e.int_period || 12));
  sv("p-int-authority", e.int_authority || "");
  sv("p-int-status2026",e.int_status2026|| "");
  const intFixed = !!(e.int_base && e.int_rule);
  document.getElementById("p-int-fixed").checked = intFixed;
  toggleIntFixed();

  // External
  sv("p-ext-type",      e.ext_type      || "");
  sv("p-ext-last",      e.ext_last      || "");
  sv("p-ext-incorp",    e.ext_incorp    || "");
  sv("p-ext-base",      e.ext_base      || "");
  sv("p-ext-rule",      e.ext_rule      || "base_date + 42 days");
  sv("p-ext-period",    String(e.ext_period || 12));
  sv("p-ext-authority", e.ext_authority || "");
  sv("p-ext-status2026",e.ext_status2026|| "");
  const extFixed = !!(e.ext_base && e.ext_rule);
  document.getElementById("p-ext-fixed").checked = extFixed;
  toggleExtFixed();

  document.getElementById("add-panel").classList.add("open");
  document.getElementById("overlay").classList.add("open");
}

function closeAddPanel() {
  document.getElementById("add-panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
  editingId = null;
}

function clearForm() {
  ["p-name","p-country","p-int-type","p-int-last","p-int-incorp","p-int-base","p-int-authority",
   "p-ext-type","p-ext-last","p-ext-incorp","p-ext-base","p-ext-authority"].forEach(id => sv(id,""));
  sv("p-int-rule","base_date + 42 days");
  sv("p-ext-rule","base_date + 42 days");
  sv("p-int-period","12"); sv("p-ext-period","12");
  sv("p-int-status2026",""); sv("p-ext-status2026","");
  sv("p-section","intl"); sv("p-src","USR");
  document.getElementById("p-int-fixed").checked = false;
  document.getElementById("p-ext-fixed").checked = false;
  toggleIntFixed(); toggleExtFixed();
}

function showError(msg) {
  const el = document.getElementById("panel-error");
  el.className = "error-msg";
  el.textContent = msg;
  el.style.display = "block";
}

function saveEntity() {
  const name    = gv("p-name").trim();
  const country = gv("p-country").trim();
  const section = gv("p-section") || "intl";
  const src     = gv("p-src");

  if (!name)    { showError("Entity name is required."); return; }
  if (!country) { showError("Country is required."); return; }

  const intFixed = document.getElementById("p-int-fixed").checked;
  const extFixed = document.getElementById("p-ext-fixed").checked;

  const entity = {
    name, country, section, src,
    int_type:      gv("p-int-type").trim(),
    int_base:      intFixed ? gv("p-int-base").trim() : "",
    int_rule:      intFixed ? gv("p-int-rule").trim() : "",
    int_period:    parseInt(gv("p-int-period")) || 12,
    int_last:      intFixed ? "" : gv("p-int-last"),
    int_incorp:    intFixed ? "" : gv("p-int-incorp"),
    int_authority: gv("p-int-authority").trim(),
    int_status2026:gv("p-int-status2026"),
    ext_type:      gv("p-ext-type").trim(),
    ext_base:      extFixed ? gv("p-ext-base").trim() : "",
    ext_rule:      extFixed ? gv("p-ext-rule").trim() : "",
    ext_period:    parseInt(gv("p-ext-period")) || 12,
    ext_last:      extFixed ? "" : gv("p-ext-last"),
    ext_incorp:    extFixed ? "" : gv("p-ext-incorp"),
    ext_authority: gv("p-ext-authority").trim(),
    ext_status2026:gv("p-ext-status2026"),
  };

  if (editingId !== null) {
    const idx = ENTITIES.findIndex(x => x.id === editingId);
    if (idx >= 0) ENTITIES[idx] = { ...entity, id: editingId };
  } else {
    entity.id = nextId++;
    ENTITIES.push(entity);
  }

  populateCountryFilter();
  closeAddPanel();
  render();
  debouncedSave();
}

function deleteEntity() {
  if (!confirm("Delete this entity?")) return;
  ENTITIES = ENTITIES.filter(x => x.id !== editingId);
  populateCountryFilter();
  closeAddPanel();
  render();
  debouncedSave();
}

// ──────────────────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────────────────
function clearFilters() {
  ["f-country","f-status","f-section","f-fs2026"].forEach(id => document.getElementById(id).value = "");
  render();
}

function populateCountryFilter() {
  const all = [...new Set(ENTITIES.map(e => e.country))].sort();
  const sel = document.getElementById("f-country");
  const cur = sel.value;
  sel.innerHTML = `<option value="">All</option>` + all.map(c => `<option${c===cur?" selected":""}>${c}</option>`).join("");
}

function exportCSV() {
  const all = processed();
  const intlRows = applySort(applyFilters(all).filter(e => e.section === "intl"));
  const usRows   = applySort(applyFilters(all).filter(e => e.section === "us"));
  const data = [...intlRows, ...usRows];
  const hdr = "Section,Entity,Country,Internal Type,Internal Deadline,Internal Days,Internal Status,Internal Filed 2026,External Type,External Deadline,External Days,External Status,External Filed 2026,Overall Status,Source";
  const rows = data.map(e =>
    `"${e.section==="us"?"US State":"International"}","${e.name}","${e.country}","${e.int_type||''}","${fmtDate(e.int_dl)}","${e.int_days??''}","${e.int_status||''}","${FS_LABEL_INT[e.int_status2026||'']||''}","${e.ext_type||''}","${fmtDate(e.ext_dl)}","${e.ext_days??''}","${e.ext_status||''}","${FS_LABEL_EXT[e.ext_status2026||'']||''}","${e.status}","${e.src}"`
  );
  const blob = new Blob([[hdr,...rows].join("\n")], {type:"text/csv"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = "ideals_compliance.csv"; a.click();
}

// ──────────────────────────────────────────────────────
// SYNC — Firebase Realtime Database (REST API, no SDK needed)
// ──────────────────────────────────────────────────────
const FB_URL = 'https://ideals-compliance-default-rtdb.firebaseio.com/compliance.json';
let saveDebounce = null;
let refreshTimer  = null;

function setSyncStatus(state, msg) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className   = 'sync-dot ' + state;
  lbl.textContent = msg;
}

function saveToLocal() {
  try {
    localStorage.setItem('lct_entities', JSON.stringify({ entities: ENTITIES, ts: Date.now() }));
  } catch(e) {}
}

function loadFromLocal() {
  try {
    const saved = localStorage.getItem('lct_entities');
    if (!saved) return false;
    const payload = JSON.parse(saved);
    const entities = Array.isArray(payload) ? payload : payload.entities;
    if (Array.isArray(entities) && entities.length > 0 && entities[0].int_type !== undefined) {
      ENTITIES = entities;
      nextId = Math.max(...ENTITIES.map(e => e.id), 40) + 1;
      return true;
    }
  } catch(e) {}
  return false;
}

async function saveToCloud() {
  try {
    setSyncStatus('saving', 'Saving…');
    const r = await fetch(FB_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ entities: ENTITIES, ts: Date.now() })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    setSyncStatus('ok', 'Saved ' + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    setSyncStatus('error', 'Save error');
    console.error('Firebase save error:', e);
  }
}

async function fetchFromCloud() {
  try {
    const r = await fetch(FB_URL);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (!data || !data.entities) return false;
    const cloudTs = data.ts || 0;
    // Firebase is source of truth — always use cloud data if it has valid structure
    if (data.entities[0] && data.entities[0].int_type !== undefined) {
      ENTITIES = data.entities;
      nextId = Math.max(...ENTITIES.map(e => e.id), 40) + 1;
      saveToLocal();
      populateCountryFilter();
      render();
    }
    setSyncStatus('ok', 'Synced ' + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}));
    return true;
  } catch(e) {
    setSyncStatus('error', 'Sync error');
    return false;
  }
}

function debouncedSave() {
  saveToLocal();
  clearTimeout(saveDebounce);
  saveDebounce = setTimeout(saveToCloud, 800);
}

async function connectCloud(pushOnly = false) {
  if (pushOnly) {
    await saveToCloud();
    startRefresh();
  } else {
    const ok = await fetchFromCloud();
    if (ok) startRefresh();
    else setSyncStatus('offline', 'Offline — local only');
  }
}

function startRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(fetchFromCloud, 30000);
}

async function forceSyncToCloud() {
  await saveToCloud();
  alert('✅ Synced! Colleagues will see your changes within 30 seconds.');
}

function openSetupModal() {} function closeSetupModal() {}

// ──────────────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────────────
const today = new Date();
document.getElementById('hdr-date').textContent =
  'Today: ' + today.toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});

// Load from localStorage for instant display (if available)
loadFromLocal();
populateCountryFilter();
render();

// Always pull from Firebase — cloud is the source of truth
// Firebase data overwrites local only if it's newer
connectCloud(false);
</script>
